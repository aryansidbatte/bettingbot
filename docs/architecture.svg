<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#4b5563"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#22c55e"/>
    </marker>
    <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#a855f7"/>
    </marker>
    <marker id="arr-amber" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f59e0b"/>
    </marker>
    <marker id="arr-indigo" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="540" fill="#0f1117"/>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Bettingbot — AWS Architecture</text>
  <text x="460" y="46" text-anchor="middle" font-size="11" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Discord bot deployed on ECS Fargate with automated CI/CD</text>

  <!-- CI/CD panel -->
  <rect x="168" y="62" width="192" height="390" rx="10" fill="#161d2e" stroke="#2d3a52" stroke-width="1"/>
  <text x="264" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#4b5563" letter-spacing="1.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">CI / CD</text>

  <!-- AWS panel -->
  <rect x="392" y="62" width="464" height="390" rx="10" fill="#141d2b" stroke="#1e3a5f" stroke-width="1"/>
  <text x="624" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#2563eb" opacity="0.8" letter-spacing="1.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">AMAZON WEB SERVICES</text>

  <!-- Developer -->
  <circle cx="80" cy="198" r="13" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <line x1="80" y1="211" x2="80" y2="238" stroke="#64748b" stroke-width="1.5"/>
  <line x1="60" y1="224" x2="100" y2="224" stroke="#64748b" stroke-width="1.5"/>
  <line x1="80" y1="238" x2="65" y2="258" stroke="#64748b" stroke-width="1.5"/>
  <line x1="80" y1="238" x2="95" y2="258" stroke="#64748b" stroke-width="1.5"/>
  <text x="80" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Developer</text>
  <text x="80" y="291" text-anchor="middle" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">git push</text>

  <!-- GitHub box -->
  <rect x="22" y="318" width="116" height="56" rx="8" fill="#1a2130" stroke="#2d3748" stroke-width="1"/>
  <image href="https://cdn.simpleicons.org/github/94a3b8" x="33" y="333" width="18" height="18"/>
  <text x="60" y="344" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">GitHub</text>
  <text x="60" y="360" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">main branch</text>

  <!-- Step 1: Run Tests -->
  <rect x="184" y="100" width="160" height="70" rx="8" fill="#1e2a3d" stroke="#2d3f5c" stroke-width="1"/>
  <image href="https://cdn.simpleicons.org/pytest/94a3b8" x="197" y="116" width="18" height="18"/>
  <text x="224" y="124" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Run Tests</text>
  <text x="224" y="140" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pytest · 124 tests</text>
  <text x="224" y="156" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Python 3.11</text>

  <!-- Step 2: Build & Push -->
  <rect x="184" y="190" width="160" height="70" rx="8" fill="#1e2a3d" stroke="#2d3f5c" stroke-width="1"/>
  <image href="https://cdn.simpleicons.org/docker/2496ED" x="197" y="206" width="18" height="18"/>
  <text x="224" y="214" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Build Image</text>
  <text x="224" y="230" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">docker build</text>
  <text x="224" y="246" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">push to ECR</text>

  <!-- Step 3: Deploy -->
  <rect x="184" y="280" width="160" height="70" rx="8" fill="#1e2a3d" stroke="#2d3f5c" stroke-width="1"/>
  <image href="https://cdn.simpleicons.org/amazonaws/FF9900" x="197" y="296" width="18" height="18"/>
  <text x="224" y="304" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Deploy</text>
  <text x="224" y="320" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">register task def</text>
  <text x="224" y="336" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">update ECS service</text>

  <!-- Step connectors -->
  <line x1="264" y1="170" x2="264" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="264" y1="260" x2="264" y2="278" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dev → GitHub Actions -->
  <line x1="140" y1="260" x2="178" y2="185" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ECR -->
  <rect x="412" y="100" width="150" height="70" rx="8" fill="#1a2d4a" stroke="#1d4ed8" stroke-width="1.2"/>
  <image href="https://cdn.simpleicons.org/amazonaws/FF9900" x="424" y="116" width="18" height="18"/>
  <text x="452" y="124" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">ECR</text>
  <text x="452" y="140" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Container Registry</text>
  <text x="452" y="156" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">versioned image store</text>

  <!-- Build → ECR -->
  <line x1="344" y1="220" x2="406" y2="142" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="358" y="168" font-size="9" fill="#3b82f6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">push</text>

  <!-- ECS Fargate -->
  <rect x="412" y="216" width="160" height="100" rx="8" fill="#172a1e" stroke="#15803d" stroke-width="1.5"/>
  <image href="https://cdn.simpleicons.org/docker/2496ED" x="424" y="232" width="18" height="18"/>
  <text x="452" y="240" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">ECS Fargate</text>
  <text x="452" y="256" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Discord bot container</text>
  <text x="424" y="276" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">256 CPU · 512 MB RAM</text>
  <text x="424" y="292" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">python:3.11-slim image</text>
  <text x="424" y="308" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">rolling deploy · 1 task</text>

  <!-- ECR → ECS -->
  <line x1="486" y1="170" x2="486" y2="214" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="492" y="198" font-size="9" fill="#3b82f6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pull</text>

  <!-- Deploy → ECS -->
  <line x1="344" y1="315" x2="410" y2="286" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Secrets Manager -->
  <rect x="618" y="216" width="155" height="70" rx="8" fill="#22163a" stroke="#6d28d9" stroke-width="1.2"/>
  <image href="https://cdn.simpleicons.org/amazonaws/FF9900" x="630" y="232" width="18" height="18"/>
  <text x="658" y="240" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Secrets Manager</text>
  <text x="630" y="260" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">DISCORD_TOKEN</text>
  <text x="630" y="276" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">DATABASE_URL</text>

  <!-- ECS ← Secrets -->
  <line x1="616" y1="250" x2="574" y2="262" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <text x="581" y="244" font-size="9" fill="#a855f7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">fetch at startup</text>

  <!-- RDS Postgres -->
  <rect x="618" y="328" width="155" height="72" rx="8" fill="#162212" stroke="#15803d" stroke-width="1.2"/>
  <image href="https://cdn.simpleicons.org/postgresql/4169E1" x="630" y="344" width="18" height="18"/>
  <text x="658" y="352" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">RDS Postgres</text>
  <text x="630" y="372" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">db.t3.micro · private</text>
  <text x="630" y="388" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">users · bets · wagers</text>

  <!-- ECS → RDS -->
  <line x1="572" y1="301" x2="616" y2="354" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- CloudWatch -->
  <rect x="412" y="372" width="155" height="58" rx="8" fill="#251c0c" stroke="#b45309" stroke-width="1.2"/>
  <image href="https://cdn.simpleicons.org/amazonaws/FF9900" x="424" y="386" width="18" height="18"/>
  <text x="452" y="394" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">CloudWatch</text>
  <text x="424" y="412" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">JSON structured logs</text>
  <text x="424" y="426" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">crash alerts via SNS</text>

  <!-- ECS → CloudWatch -->
  <line x1="466" y1="316" x2="462" y2="370" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <text x="472" y="348" font-size="9" fill="#f59e0b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">logs</text>

  <!-- Discord -->
  <rect x="790" y="216" width="106" height="70" rx="8" fill="#15163a" stroke="#4f46e5" stroke-width="1.5"/>
  <image href="https://cdn.simpleicons.org/discord/5865F2" x="802" y="232" width="18" height="18"/>
  <text x="830" y="240" font-size="11" font-weight="600" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Discord</text>
  <text x="802" y="260" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Gateway API</text>
  <text x="802" y="276" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">WebSocket conn.</text>

  <!-- ECS ↔ Discord -->
  <line x1="572" y1="261" x2="788" y2="254" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)"/>
  <text x="670" y="248" font-size="9" fill="#818cf8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">commands &amp; responses</text>

  <!-- Legend -->
  <rect x="22" y="410" width="135" height="120" rx="8" fill="#1a2130" stroke="#2d3748" stroke-width="1"/>
  <text x="34" y="428" font-size="9" font-weight="700" fill="#4b5563" letter-spacing="1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">LEGEND</text>
  <line x1="34" y1="444" x2="62" y2="444" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="448" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Image push/pull</text>
  <line x1="34" y1="462" x2="62" y2="462" stroke="#22c55e" stroke-width="1.5"/>
  <text x="70" y="466" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">DB queries</text>
  <line x1="34" y1="480" x2="62" y2="480" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="484" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Secret injection</text>
  <line x1="34" y1="498" x2="62" y2="498" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="502" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Logs</text>
  <line x1="34" y1="516" x2="62" y2="516" stroke="#6366f1" stroke-width="1.5"/>
  <text x="70" y="520" font-size="10" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">WebSocket</text>

</svg>
